{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'styles.css' %}" />
</head>
<body>
  <div class="app" style="justify-content:center; align-items:center; padding:24px;">
    <main class="card" style="width: min(460px, 100%);">
      <div class="d-flex align-items-center gap-3 mb-3">
        <div class="brand-mark" aria-hidden="true">U</div>
        <div>
          <div class="brand-title">UNITECNAR</div>
          <div class="brand-sub">Sistema de Gestión de Extensión</div>
        </div>
      </div>

      <h1 class="page-title" style="margin-top:0;">Iniciar sesión</h1>
      <p class="page-subtitle">Ingresa con tu usuario y contraseña</p>

      {% if form.errors %}
        <div class="alert alert-danger" role="alert">
          Usuario o contraseña incorrectos.
        </div>
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label" for="id_username">Usuario</label>
          <input class="form-control" type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username">
        </div>

        <div class="mb-3">
          <label class="form-label" for="id_password">Contraseña</label>
          <input class="form-control" type="password" name="password" autocomplete="current-password" required id="id_password">
        </div>

        {% if next %}
          <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary">Entrar</button>
        </div>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
