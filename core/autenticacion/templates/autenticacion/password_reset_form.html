{% extends 'autenticacion/_base.html' %}

{% block title %}Restablecer contraseña{% endblock %}

{% block content %}
  <h1 class="page-title" style="margin-top:0;">Restablecer contraseña</h1>
  <p class="page-subtitle">Ingresa tu correo y te enviaremos un enlace</p>

  {% if form.errors %}
    <div class="soft-box soft-warning" role="alert">Revisa el correo ingresado.</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="field">
      <label for="id_email">Correo</label>
      <input class="input" type="email" name="email" autocomplete="email" required id="id_email" value="{{ form.email.value|default_if_none:'' }}">
    </div>

    <div class="d-grid gap-2" style="margin-top: 14px;">
      <button type="submit" class="btn btn-wide">Enviar enlace</button>
      <a class="btn btn-secondary btn-wide" href="{% url 'autenticacion:login' %}">Volver al login</a>
    </div>
  </form>
{% endblock %}
