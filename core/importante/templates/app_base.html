{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}UNITECNAR{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'styles.css' %}" />
</head>
<body>
  <div class="app">
    {% block sidebar %}{% include 'partials/sidebar.html' %}{% endblock %}

    <div class="content">
      <header class="topbar" aria-label="Barra superior">
        <button class="icon-btn" type="button" data-sidebar-toggle aria-label="Abrir o cerrar menú">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <div style="display:flex; align-items:center; gap:14px;">
          <button class="icon-btn" type="button" data-theme-toggle aria-label="Cambiar tema" title="Cambiar tema">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 3v2M12 19v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M3 12h2M19 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M12 7a5 5 0 1 0 0 10a5 5 0 0 0 0-10Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
          <div class="topdot" title="Notificaciones"></div>
          <div class="avatar" title="Perfil" data-avatar-url="{{ usuario_foto_url|default:'' }}"></div>
        </div>
      </header>

      <main class="main{% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="{% static 'app.js' %}?v=20260304"></script>
</body>
</html>
